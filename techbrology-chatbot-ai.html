<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>techbrology AI chatbot | Techbrology</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="favicon.png" type="image/png">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4550811431931022" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#0f0f0f;
  --panel:#252525;
  --line:#2a2a2a;
  --text:#e3e3e3;
  --muted:#9a9a9a;
  --accent:#e3e3e3;
  --radius:16px;
  --shadow:0 18px 40px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  color:var(--text);
  background:linear-gradient(180deg,#0a0a0a,#0f0f0f);
}
a{text-decoration:none;color:inherit}
.wrap{
  max-width:1200px;
  margin:0 auto;
  padding:24px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:28px;
}
.back{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border:1px solid var(--line);
  border-radius:999px;
  color:var(--muted);
}
.back:hover{border-color:var(--accent);color:var(--text)}
.card{
  background:rgba(37,37,37,.85);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.hero{
  padding:26px;
  margin-bottom:22px;
}
.hero h1{
  margin:0 0 10px;
  font-size:clamp(32px,5vw,50px);
}
.hero p{
  margin:0;
  color:var(--muted);
  line-height:1.6;
  max-width:720px;
}
.frame-card{
  padding:18px;
}
.generator-frame{
  width:100%;
  height:78vh;
  min-height:620px;
  border:1px solid var(--line);
  border-radius:14px;
  background:#000;
}
.caption{
  margin-top:14px;
  color:var(--muted);
}
.video-card{
  margin-top:22px;
  padding:18px;
}
.video-card h2{
  margin:0 0 14px;
  font-size:22px;
}
.video-frame{
  width:100%;
  aspect-ratio:16 / 9;
  border:1px solid var(--line);
  border-radius:14px;
  background:#000;
}
@media (max-width: 700px){
  .wrap{padding:18px}
  .topbar{align-items:flex-start;flex-direction:column}
  .generator-frame{
    height:70vh;
    min-height:480px;
  }
}
</style>
</head>
<body>

<main class="wrap">
  <div class="topbar">
    <a class="back" href="index.html">Back to home</a>
  </div>

  <section class="hero card">
    <h1>Techbrology Ai Chatbot</h1>
    <p>AI chatbot from "I made an AI and I can't even code"</p>
  </section>

  <section class="frame-card card">
    <iframe
      class="generator-frame"
      src="LLM%20AI.html"
      title="techbrology AI chatbot"
    ></iframe>
    <p class="caption">The chatbot runs inside this page instead of taking over the whole site.</p>
  </section>

  <section class="video-card card">
    <h2>Video</h2>
    <iframe
      class="video-frame"
      src="https://www.youtube.com/embed/v9zZky14Sb4?start=109"
      title="techbrology AI chatbot video"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </section>
</main>

</body>
</html>
