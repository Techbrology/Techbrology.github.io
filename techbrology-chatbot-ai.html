<!doctype html>

<style>
:root{
  --bg:#0f0f0f;
  --panel:#252525;
  --line:#1e1f20;
  --hover:#518DD5;
  --text:#e3e3e3;
  --muted:#9a9a9a;
  --accent:#e3e3e3;
  --radius:0;
  --shadow:0 18px 40px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:
    radial-gradient(circle at top, rgba(227,227,227,.03), transparent 40%),
    linear-gradient(180deg, #0a0a0a 0%, var(--bg) 55%, #0a0a0a 100%);
  color:var(--text);
}
a{text-decoration:none;color:inherit}
.wrap{max-width:1100px;margin:0 auto;padding:24px}
header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(15,15,15,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.brand{
  display:flex;
  align-items:center;
  gap:17px;
}
.logo{
  width:40px;
  height:40px;
  border-radius:6px;
  display:block;
  object-fit:cover;
  border:1px solid var(--line);
  transform:scale(1.5);
  transform-origin:center center;
}
nav{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
nav a,
.back{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:7px 16px;
  border:1px solid var(--line);
  outline:1px solid rgba(81,141,213,.18);
  outline-offset:0;
  border-radius:0;
  font-size:14px;
  transition:border-color .32s ease, outline-color .32s ease, box-shadow .4s ease, transform .32s ease;
}
nav a:hover,
.back:hover{
  border-color:var(--hover);
  outline-color:rgba(81,141,213,.6);
  box-shadow:
    0 0 18px rgba(81,141,213,.22),
    0 0 36px rgba(81,141,213,.18),
    0 0 62px rgba(81,141,213,.12);
}
.nav-icon{
  width:24px;
  height:24px;
  border-radius:0;
  object-fit:cover;
  display:block;
  transform:scale(1.5);
  transform-origin:center center;
  margin-right:5px;
}
.page-actions{
  margin:4px 0 0;
}
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.hero{
  padding:26px;
  margin:22px 0;
}
.hero h1{
  margin:0 0 10px;
  font-size:clamp(32px,5vw,50px);
}
.hero p{
  margin:0;
  color:var(--muted);
  line-height:1.6;
  max-width:720px;
}
.frame-card,
.video-card{
  padding:18px;
}
.video-card{
  margin-top:22px;
}
.video-card h2{
  margin:0 0 14px;
  font-size:22px;
}
.generator-frame{
  width:100%;
  height:78vh;
  min-height:620px;
  border:1px solid var(--line);
  border-radius:0;
  background:#000;
}
.video-frame{
  width:100%;
  aspect-ratio:16 / 9;
  border:1px solid var(--line);
  border-radius:0;
  background:#000;
}
.caption{
  margin-top:14px;
  color:var(--muted);
}
footer{
  margin-top:60px;
  padding:8px 20px;
  border-top:1px solid var(--line);
  color:var(--muted);
  font-size:13px;
}
.footer-links{
  margin-top:6px;
}
.footer-links a:hover{
  color:var(--hover);
}
@media (max-width:900px){
  .top{
    flex-direction:column;
    align-items:flex-start;
    gap:18px;
  }
}
@media (max-width:700px){
  .wrap{padding:18px}
  .generator-frame{
    height:70vh;
    min-height:480px;
  }
}
</style>
</head>
<body>

<header>

<main class="wrap">

<footer>
  <div class="wrap">
    &copy; <span id="year"></span> Techbrology
    <div class="footer-links">
      <a href="mailto:gippyioiscool@gmail.com">email</a>
    </div>

document.getElementById("year").textContent = new Date().getFullYear();
</script>

</html>
